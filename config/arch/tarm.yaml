name: tarm.tarm@TARM
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

# Default: non-recursive TARM
loops: 16
H_cycles: 2
L_cycles: 6

num_layers: 4
hidden_size: 64
num_heads: 8
expansion: 4

puzzle_emb_ndim: ${.hidden_size}
# Allowed values: learned | learnable (alias of learned) | rope | none
pos_encodings: rope
# Example override for URM-vs-TARM ablations:
# pos_encodings: rope

# Tropical attention options
# tropical_proj: false
# tropical_qkv_proj: true
# tropical_norm: none
# q_dropout: 0.0
# k_dropout: 0.0
# v_dropout: 0.0

forward_dtype: bfloat16
