# ARC training config

defaults:
  - arch: urm
  - _self_

hydra:
  output_subdir: null

# Data path
data_path: data/arc-aug-1000

evaluators:
  - name: arc@ARC

# Hyperparams - Training
## originally 768
global_batch_size: 12
# orginally 1
grad_accum_steps: 1

epochs: 200000
eval_interval: 10
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

target_q_update_every: 4

# Standard hyperparameter settings for LM, as used in Llama
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1

# Hyperparams - Puzzle embeddings training
puzzle_emb_lr: 1e-2

use_muon: False
optimizer_name: adam_atan2

project_name: urm_tarm_activation_probe
wandb_group: null
wandb_tags: []
wandb_job_type: null

probe:
  enabled: false
  interval_steps: 100
  histogram_interval_steps: 500
  raw_save_interval_steps: 1000
  save_dir: analysis/activation_probe
  sample_examples: 2
  sample_tokens: 16
  sample_hidden_dims: 64
  sample_output_vocab_dims: 128
  flat_sample_size: 65536
  max_hist_points: 32768
  rank0_only: true
  log_wandb_histograms: true
  log_wandb_scalars: true
  save_raw_locally: true
  include_hidden_states: true
  include_new_carry: true
  include_output: true
  include_q_logits: true
  include_q_halt: true
  include_q_continue: true
  seed: 0
